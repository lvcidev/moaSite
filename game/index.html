<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../global.css">
<link rel="shortcut icon" href="../favicon/favicon.ico" type="image/x-icon">
<title>Jogo 2D</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

canvas {
    image-rendering: pixelated;
    border: 4px solid black;
}
</style>

</head>
<body>

<div class="left">

<button id="menuBtn" class="menu-btn">☰</button>

<div class="logo"><a href="index.html"><img src="img/white-logo.png" alt="" id="logoM"></a></div>

</div>

<input type="text" placeholder="Pesquisar...">
<button>🔍</button>

</div>

<button class="login">Login</button>

</div>

<nav id="sidebar" class="sidebar">

<a href="#">Cursos</a>
<a href="game/index.html">Games</a>

</nav>

<canvas id="gameCanvas" width="480" height="270"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "menu";

// =======================
// IMAGENS
// =======================
const images = {
    player: loadImage("player.png"),
    enemy: loadImage("enemy.png"),
    bg: loadImage("bg.png") // bg + chão juntos
};

function loadImage(src) {
    const img = new Image();
    img.src = src;
    return img;
}

// =======================
const SPRITE_WIDTH = 400;
const SPRITE_HEIGHT = 400;

// =======================
// PLAYER
// =======================
const player = {
    x: 350,
    y: 0,
    width: 60,
    height: 70,

    vy: 0,
    grounded: false,

    speed: 2,
    direction: -1,

    frame: 0,
    frameTimer: 0,
    frameSpeed: 10,

    state: "idle",
    attacking: false,

    health: 100
};

// =======================
// ENEMY
// =======================
const enemy = {
    x: 100,
    y: 0,
    width: 60,
    height: 70,

    vy: 0,
    grounded: false,

    direction: 1,

    frame: 0,
    frameTimer: 0,
    frameSpeed: 12,

    state: "idle",
    attacking: false,

    health: 100
};

// =======================
// ANIMAÇÕES
// =======================
const playerAnim = {
    idle: { frames: 2 },
    walk: { frames: 3 },
    punch: { frames: 3 }
};

const enemyAnim = {
    idle: { row: 0, frames: 3 },
    attack: { row: 1, frames: 3 },
    hit: { row: 2, frames: 3 }
};

// =======================
const gravity = 0.4;
const groundY = 230;

// =======================
// INPUT
// =======================
const keys = {};

document.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;

    if (gameState === "menu" && e.code === "Space") {
        gameState = "game";
    }

    if (e.code === "ArrowRight" && !player.attacking) {
        player.attacking = true;
        player.state = "punch";
        player.frame = 0;
    }
});

document.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

// =======================
// UPDATE
// =======================
function update() {

    if (gameState !== "game") return;

    let moving = false;

    // PLAYER
    if (!player.attacking) {

        if (keys["d"]) {
            player.x += player.speed;
            player.direction = 1;
            moving = true;
        }

        if (keys["a"]) {
            player.x -= player.speed;
            player.direction = -1;
            moving = true;
        }

        if (keys["w"] && player.grounded) {
            player.vy = -7;
            player.grounded = false;
        }

        player.state = moving ? "walk" : "idle";
    }

    player.vy += gravity;
    player.y += player.vy;

    if (player.y + player.height >= groundY) {
        player.y = groundY - player.height;
        player.vy = 0;
        player.grounded = true;
    }

    // =======================
    // ENEMY AI
    // =======================
    let dist = player.x - enemy.x;

    if (!enemy.attacking) {

        if (Math.abs(dist) > 60) {
            enemy.x += dist > 0 ? 1 : -1;
            enemy.direction = dist > 0 ? 1 : -1;
            enemy.state = "idle";
        } else {
            enemy.attacking = true;
            enemy.state = "attack";
            enemy.frame = 0;
        }
    }

    enemy.vy += gravity;
    enemy.y += enemy.vy;

    if (enemy.y + enemy.height >= groundY) {
        enemy.y = groundY - enemy.height;
        enemy.vy = 0;
        enemy.grounded = true;
    }

    // =======================
    // COLISÃO ATAQUE
    // =======================
    if (player.attacking && checkCollision(player, enemy)) {
        enemy.state = "hit";
        enemy.frame = 0;
        enemy.health -= 1;
    }

    animate(player, playerAnim);
    animateEnemy(enemy);
}

// =======================
function checkCollision(a, b) {
    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

// =======================
function animate(entity, animSet) {

    entity.frameTimer++;

    if (entity.frameTimer >= entity.frameSpeed) {
        entity.frame++;
        entity.frameTimer = 0;

        if (entity.frame >= animSet[entity.state].frames) {

            if (entity.attacking) {
                entity.attacking = false;
                entity.state = "idle";
            }

            entity.frame = 0;
        }
    }
}

// =======================
function animateEnemy(enemy) {

    enemy.frameTimer++;

    if (enemy.frameTimer >= enemy.frameSpeed) {
        enemy.frame++;
        enemy.frameTimer = 0;

        const anim = enemyAnim[enemy.state];

        if (enemy.frame >= anim.frames) {

            if (enemy.state === "attack") {
                enemy.attacking = false;
                enemy.state = "idle";
            }

            if (enemy.state === "hit") {
                enemy.state = "idle";
            }

            enemy.frame = 0;
        }
    }
}

// =======================
function drawPlayer() {

    let frameX = 0;
    let frameY = 0;

    if (player.state === "idle") {
        frameX = 0;
        frameY = player.frame === 0 ? 0 : 1;
    }

    if (player.state === "walk") {
        frameX = player.frame + 1;
        frameY = 0;
    }

    if (player.state === "punch") {
        frameX = player.frame + 1;
        frameY = 1;
    }

    drawSprite(player, images.player, frameX, frameY);
}

// =======================
function drawEnemy() {

    const anim = enemyAnim[enemy.state];

    const frameX = enemy.frame;
    const frameY = anim.row;

    drawSprite(enemy, images.enemy, frameX, frameY);
}

// =======================
function drawSprite(entity, img, frameX, frameY) {

    frameX *= SPRITE_WIDTH;
    frameY *= SPRITE_HEIGHT;

    ctx.save();

    if (entity.direction === -1) {
        ctx.drawImage(img, frameX, frameY, SPRITE_WIDTH, SPRITE_HEIGHT,
            entity.x, entity.y, entity.width, entity.height);
    } else {
        ctx.scale(-1, 1);
        ctx.drawImage(img, frameX, frameY, SPRITE_WIDTH, SPRITE_HEIGHT,
            -entity.x - entity.width, entity.y, entity.width, entity.height);
    }

    ctx.restore();
}

// =======================
function draw() {

    ctx.drawImage(images.bg, 0, 0, canvas.width, canvas.height);

    if (gameState === "menu") {
        ctx.fillStyle = "#000";
        ctx.fillText("PRESSIONE ESPAÇO", 120, 120);
        return;
    }

    drawPlayer();
    drawEnemy();

    // vida simples
    ctx.fillStyle = "red";
    ctx.fillRect(20, 20, player.health * 2, 10);

    ctx.fillStyle = "purple";
    ctx.fillRect(20, 40, enemy.health * 2, 10);
}

// =======================
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
